<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">

    <title>Profile card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kumbh Sans', sans-serif;
        }
        
        body {
            background-color: hsl(185, 75%, 39%);

        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('./images/bg-pattern-top.svg'), url('./images/bg-pattern-bottom.svg');
            background-repeat: no-repeat no-repeat;
            background-position: right 90vh bottom 50vh, left 90vh top 50vh;
        }
        .profile-card {
            max-width: 340px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
        }
        .profile-card-pattern {
            width: 100%;
        }
        .profile-content img {
            border-radius: 50%;
            border: 5px solid white;
        }
        .profile-name {
            font-size: 18px;
            color: hsl(229, 23%, 23%);
            margin-bottom: 10px;
        }
        .profile-name span {
            font-weight: 400;
            color: hsl(227, 10%, 46%);
            margin-left: 8px;
        }
        .profile-city {
            font-size: 14px;
            color: hsl(227, 10%, 46%);
        }
        .profile-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 20px 0;
            position: relative;
        }
        .profile-img-cr {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -74px);
        }
        .profile-nc {
            margin-top: 60px;
        }
        .profile-stats {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid hsl(0deg 4% 89%);
            padding: 30px 40px 10px;
        }
        .profile-stats-info .count {
            font-size: 18px;
            font-weight: 700;
            color: hsl(229, 23%, 23%);
            letter-spacing: 0.3px;
            margin-bottom: 10px;
        }
        .profile-stats-info p:nth-child(2) {
            font-size: 12px;
            letter-spacing: 1.2px;
            color: hsl(227, 10%, 46%);
        }
    </style>
</head>
<body>

    <main>
        <section class="container">
            <div class="profile-card">
                <img class="profile-card-pattern" src="./images/bg-pattern-card.svg" alt="">
                <div class="profile-content">
                    <div class="profile-img-cr">
                        <img src="./images/image-victor.jpg" alt="profile picture">
                    </div>

                    <div class="profile-nc">
                        <h1 class="profile-name">Victor Crest <span>26</span></h1>
                        <p class="profile-city">London</p>
                    </div>

                    <div class="profile-stats">
                        <div class="profile-stats-info">
                            <p class="count">80K</p>
                            <p>Followers</p>
                        </div>
                        <div class="profile-stats-info">
                            <p class="count">803K</p>
                            <p>Likes</p>
                         </div>
                        <div class="profile-stats-info">
                            <p class="count">1.4K</p>
                            <p>Photos</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io/profile/manuelscl" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/manuelscl/profile-card">Manuel</a>.
    </div> -->
</body>
</html>
